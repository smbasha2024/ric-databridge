name: ric-databridge   # 👈 isolates this stack

services:

  databridge-frontend:
    build: 
      context: ./frontend/ric-databridge-client
      dockerfile: Dockerfile
    container_name: ric_databridge_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/ric-databridge-client/.env
    depends_on:
      - databridge-server
    networks:
      - ric-databridge-network

  databridge-server:
    build:
      context: ./api/ric-databridge-server
      dockerfile: Dockerfile
    container_name: ric_databridge_server
    restart: unless-stopped
    env_file:
      - ./api/ric-databridge-server/.env
    depends_on:
      - databridge-db
    networks:
      - ric-databridge-network
    healthcheck:
      #test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  databridge-db:
    image: postgres:17.5
    container_name: ric_databridge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - databridge_db_data:/var/lib/postgresql/data
    networks:
      - ric-databridge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  databridge-nginx:
    image: nginx:1.27
    container_name: ric_databridge_nginx
    restart: unless-stopped
    ports:
      - "8081:80"   # 👈 IMPORTANT (unique port!)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - databridge-frontend
      - databridge-server
    networks:
      - ric-databridge-network

volumes:
  databridge_db_data:

networks:
  ric-databridge-network:
    driver: bridge